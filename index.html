<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buerxzhang - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 60px 0;
            color: white;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInDown 1s ease-out;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .main-content {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            margin: 40px 0;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }

        .feature-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .feature-card:nth-child(2) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .feature-card:nth-child(3) {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }

        .feature-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .feature-description {
            opacity: 0.9;
            line-height: 1.5;
        }

        .interactive-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 40px;
            margin: 40px 0;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stats-section {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin: 40px 0;
            text-align: center;
        }

        .stat-item {
            flex: 1;
            min-width: 200px;
            padding: 20px;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            display: block;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 1.1rem;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: white;
            opacity: 0.8;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .shape {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 20%;
            right: 15%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 30%;
            left: 5%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 40px;
            height: 40px;
            bottom: 20%;
            right: 10%;
            animation-delay: 1s;
        }

        .shape:nth-child(5) {
            width: 70px;
            height: 70px;
            top: 50%;
            left: 80%;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">Buerxzhang</div>
            <div class="subtitle">小程序 / 云开发 爱好者 · 西安</div>
        </header>

        <div class="main-content">
            <h2 style="text-align: center; font-size: 1.8rem; margin-bottom: 10px;">🚀 我的项目</h2>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">目前正在开发中的开源项目</p>

            <div class="feature-grid">
                <a class="feature-card" href="https://github.com/Buerxzhang/douyin-watermark-parser" target="_blank">
                    <span class="feature-icon">🎬</span>
                    <div class="feature-title">去水印解析助手</div>
                    <div class="feature-description">
                        基于微信小程序 + 云开发的抖音视频/图文去水印解析工具。
                    </div>
                </a>

                <a class="feature-card" href="https://github.com/Buerxzhang" target="_blank">
                    <span class="feature-icon">💻</span>
                    <div class="feature-title">更多项目</div>
                    <div class="feature-description">
                        持续学习中，探索小程序与云开发的更多可能性。
                    </div>
                </a>

                <a class="feature-card" href="https://github.com/Buerxzhang" target="_blank">
                    <span class="feature-icon">🌟</span>
                    <div class="feature-title">关注我</div>
                    <div class="feature-description">
                        在 GitHub 上关注我，第一时间获取项目更新。
                    </div>
                </a>
            </div>

            <div class="interactive-section">
                <h3 style="margin-bottom: 15px;">📬 互动一下</h3>
                <p style="color: #666; margin-bottom: 20px;">点击按钮体验页面交互效果</p>
                <button class="btn" onclick="animateButton(this)">✨ 点我试试</button>
                <button class="btn btn-secondary" onclick="changeColors()">🎨 切换主题</button>
                <button class="btn" onclick="showAlert()">💬 关于我</button>
            </div>

            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-number">1</span>
                    <span class="stat-label">开源项目</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">📍</span>
                    <span class="stat-label">西安</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">💚</span>
                    <span class="stat-label">正在学习</span>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 Buerxzhang · 用 ❤️ 构建</p>
        </footer>
    </div>

    <script>
        function showMessage(feature) {
            const messages = {
                '按钮点击': '👋 你好！欢迎来到 Buerxzhang 的个人主页！',
                '主题已切换！': '🌈 主题色已切换，喜欢这个配色吗？',
                '功能卡片': '💡 点击项目卡片可以跳转到 GitHub 仓库哦！',
                '用户体验': '🎯 好的设计提升用户体验！',
                '交互体验': '⚡ 流畅的交互让用户操作更加愉悦！'
            };
            
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
                z-index: 1000;
                animation: slideInRight 0.3s ease-out;
                max-width: 300px;
            `;
            toast.textContent = messages[feature] || feature;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.3s ease-in';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 3000);
        }

        function animateButton(button) {
            button.style.transform = 'scale(0.95)';
            setTimeout(() => {
                button.style.transform = 'scale(1)';
                showMessage('按钮点击');
            }, 150);
        }

        function changeColors() {
            const colors = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)'
            ];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.background = randomColor;
            
            showMessage('主题已切换！');
        }

        function showAlert() {
            const customAlert = document.createElement('div');
            customAlert.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: white;
                padding: 30px;
                border-radius: 15px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.3);
                z-index: 1001;
                text-align: center;
                min-width: 300px;
            `;
            
            customAlert.innerHTML = `
                <h3 style="color: #333; margin-bottom: 15px;">👋 关于我</h3>
                <p style="color: #666; margin-bottom: 10px;">大家好，我是 <strong>Buerxzhang</strong></p>
                <p style="color: #666; margin-bottom: 10px;">📍 西安 · 小程序 / 云开发 爱好者</p>
                <p style="color: #666; margin-bottom: 20px;">热衷于用技术解决实际问题，持续学习中 🚀</p>
                <button onclick="this.parentElement.remove()" style="
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    border: none;
                    padding: 10px 20px;
                    border-radius: 25px;
                    cursor: pointer;
                    font-weight: bold;
                    font-size: 16px;
                ">知道啦 👍</button>
            `;
            
            document.body.appendChild(customAlert);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOutRight {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 鼠标跟随效果
        document.addEventListener('mousemove', (e) => {
            const shapes = document.querySelectorAll('.shape');
            shapes.forEach((shape, index) => {
                const speed = (index + 1) * 0.02;
                const x = e.clientX * speed;
                const y = e.clientY * speed;
                shape.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // 滚动动画
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const shapes = document.querySelectorAll('.shape');
            shapes.forEach((shape, index) => {
                const speed = (index + 1) * 0.5;
                shape.style.transform += ` translateY(${scrolled * speed}px)`;
            });
        });
    </script>
</body>
</html>
